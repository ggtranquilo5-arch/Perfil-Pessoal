<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil | CLOUTCH</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

  <!-- Background Video Container (Local 4K MP4) -->
  <video id="video-background" autoplay loop muted playsinline>
    <source src="assets/background.mp4" type="video/mp4">
  </video>
  <div class="video-overlay"></div>

  <!-- Background Music Audio Element -->
  <audio id="bg-music" loop>
    <!-- Substitua pelo arquivo de música desejado -->
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
  </audio>

  <!-- Music Control Icon (Top Right) -->
  <div class="music-control" id="musicToggle" title="Tocar / Pausar Música">
    <i class="fas fa-music"></i>
  </div>

  <div class="container">

    <!-- Hero Section with Central Image and Floating Badges -->
    <div class="hero-section">
      <!-- Imagem Centralizada (Substitua pela imagem do Mission Evo) -->
      <img
        src="https://images.unsplash.com/photo-1542751371-adc38448a05e?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80"
        alt="CLOUTCH" class="profile-center-img">

      <!-- Floating Credentials positioned around the image -->
      <div class="floating-credentials">
        <div class="cred-badge badge-1"><i class="fas fa-map-marker-alt"></i> Localidade: Brasil</div>
        <div class="cred-badge badge-2"><i class="fas fa-user"></i> Name: CLOUTCH</div>
        <div class="cred-badge badge-3"><i class="fas fa-mars"></i> Gênero: MASCULINO</div>
      </div>
    </div>

    <!-- Games List Area -->
    <h2 class="section-title">Jogos & Nicknames</h2>

    <div class="games-list">

      <!-- Game Card 1 -->
      <div class="game-card">
        <div class="game-icon">
          <i class="fas fa-crosshairs"></i>
        </div>
        <div class="game-details">
          <div class="game-name">Mission Evo</div>
          <div class="game-nick"><i class="fas fa-gamepad"></i> Nick: CLOUTCH</div>
        </div>
      </div>

      <!-- Game Card 2 -->
      <div class="game-card">
        <div class="game-icon">
          <i class="fas fa-radiation"></i>
        </div>
        <div class="game-details">
          <div class="game-name">Rust</div>
          <div class="game-nick"><i class="fas fa-gamepad"></i> Nick: Cloutch_BR</div>
        </div>
      </div>

      <!-- Game Card 3 -->
      <div class="game-card">
        <div class="game-icon">
          <i class="fas fa-shield-alt"></i>
        </div>
        <div class="game-details">
          <div class="game-name">Valorant</div>
          <div class="game-nick"><i class="fas fa-gamepad"></i> Nick: Cloutch#BR1</div>
        </div>
      </div>

    </div>

  </div>

  <script src="js/script.js"></script>
</body>

</html>
